name: CI

on: [push, pull_request]

jobs:
    run:
        runs-on: ubuntu-latest

        steps: 
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                python-version: "3.11"
            
            - name: Run app check
              run: python3 -c "import main"